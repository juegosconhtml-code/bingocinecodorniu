<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo de Cine</title>
    <style>
        :root {
            --gold: #ffd700;
            --red: #8b0000;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            background-image: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-align: center;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5);
        }

        /* Contenedor Principal Optimizado para Vertical */
        .marquee {
            background: #222;
            border: 6px solid;
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) 1;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            width: 95%; /* Ocupa casi todo el ancho en móvil */
            max-width: 400px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        #display-image {
            width: 100%; /* Se adapta al contenedor */
            max-width: 280px;
            aspect-ratio: 3 / 4; /* Mantiene proporción vertical */
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            background-color: #333;
            display: block;
            margin: 0 auto 15px;
        }

        #character-name {
            font-size: 1.8rem;
            color: var(--gold);
            margin: 10px 0;
            min-height: 1.2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
            word-wrap: break-word;
        }

        button {
            background: var(--red);
            color: white;
            border: 2px solid var(--gold);
            padding: 12px 24px;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
            border-radius: 50px;
            width: 90%;
            touch-action: manipulation; /* Optimiza el toque en móviles */
        }

        button:active {
            transform: scale(0.95);
        }

        #counter {
            margin-top: 10px;
            color: #888;
            font-size: 0.9rem;
        }

        /* Historial adaptable */
        .history-container {
            width: 100%;
            max-width: 400px;
            margin-top: 15px;
            padding-bottom: 20px;
        }

        .history-title {
            color: var(--gold);
            font-size: 1rem;
            margin-bottom: 8px;
            text-align: center;
        }

        #history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <h1>🎬 BINGO DE CINE 🍿</h1>

    <div class="marquee">
        <img id="display-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Cine">
        <div id="character-name">¿LISTOS?</div>
        <button id="draw-btn" onclick="drawCharacter()">¡SACAR PERSONAJE!</button>
        <p id="counter">Quedan: 19 / 19</p>
    </div>

    <div class="history-container">
        <div class="history-title">YA HAN SALIDO:</div>
        <div id="history-list"></div>
    </div>

    <script>
        const characters = [
            { file: 'PIKACHU.jpg', name: 'Pikachu' },
            { file: 'RAPUNZEL.jpg', name: 'Rapunzel' },
            { file: 'SHREK.jpg', name: 'Shrek' },
            { file: 'SPIDERMAN.jpg', name: 'Spider-Man' },
            { file: 'VAIANA.jpg', name: 'Vaiana' },
            { file: 'WALLE.jpg', name: 'Wall-E' },
            { file: 'YODA.jpg', name: 'Yoda' },
            { file: 'ASNO.jpg', name: 'Asno' },
            { file: 'ELSA.jpg', name: 'Elsa' },
            { file: 'HERMIONE.jpg', name: 'Hermione' },
            { file: 'ET.jpg', name: 'E.T.' },
            { file: 'HARRYPOTTER.jpg', name: 'Harry Potter' },
            { file: 'JACKSPARROW.jpeg', name: 'Jack Sparrow' },
            { file: 'MIERCOLES.jpg', name: 'Miércoles' },
            { file: 'OLAF.jpg', name: 'Olaf' },
            { file: 'SIMBA.jpg', name: 'Simba' },
            { file: 'BUDDY.jpeg', name: 'Buddy' },
            { file: 'SUPERMAN.jpg', name: 'Superman' },
            { file: 'DARTHVADER.jpg', name: 'Darth Vader' }
        ];

        let available = [...characters];
        const historyList = document.getElementById('history-list');
        const displayImg = document.getElementById('display-image');
        const displayName = document.getElementById('character-name');
        const drawBtn = document.getElementById('draw-btn');
        const counterText = document.getElementById('counter');

        function drawCharacter() {
            if (available.length === 0) return;

            drawBtn.disabled = true;
            let iterations = 0;
            const interval = setInterval(() => {
                const tempIndex = Math.floor(Math.random() * available.length);
                displayName.innerText = available[tempIndex].name;
                iterations++;

                if (iterations > 10) {
                    clearInterval(interval);
                    finalizeSelection();
                }
            }, 70);
        }

        function finalizeSelection() {
            const randomIndex = Math.floor(Math.random() * available.length);
            const selected = available.splice(randomIndex, 1)[0];

            displayImg.src = selected.file;
            displayName.innerText = selected.name;
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = selected.name;
            historyList.prepend(item);

            counterText.innerText = `Quedan: ${available.length} / ${characters.length}`;

            if (available.length === 0) {
                drawBtn.innerText = "¡FIN!";
            } else {
                drawBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
