<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bingo de Cine</title>
    <style>
        :root {
            --gold: #ffd700;
            --red: #8b0000;
            --dark: #1a1a1a;
            --light: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            background-image: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            color: var(--light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
            text-align: center;
            margin: 10px 0;
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.5);
        }

        .marquee {
            background: #222;
            border: 6px solid;
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c) 1;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            width: 95%;
            max-width: 400px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        #display-image {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 3 / 4;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            background-color: #333;
            display: block;
            margin: 0 auto 15px;
        }

        #character-name {
            font-size: 1.8rem;
            color: var(--gold);
            margin: 10px 0;
            min-height: 1.2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        button {
            background: var(--red);
            color: white;
            border: 2px solid var(--gold);
            padding: 12px 24px;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s;
            border-radius: 50px;
            width: 90%;
            touch-action: manipulation;
        }

        .btn-reset {
            background: #444;
            font-size: 0.8rem;
            padding: 8px 15px;
            width: auto;
            border-color: #666;
            margin-top: 5px;
        }

        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #counter { margin-top: 10px; color: #888; font-size: 0.9rem; }

        .history-container { width: 100%; max-width: 400px; margin-top: 15px; padding-bottom: 20px; }
        .history-title { color: var(--gold); font-size: 1rem; margin-bottom: 8px; text-align: center; }
        #history-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .history-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
    </style>
</head>
<body>

    <h1>🎬 BINGO DE CINE 🍿</h1>

    <div class="marquee">
        <img id="display-image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Cine">
        <div id="character-name">¿LISTOS?</div>
        
        <div class="btn-group">
            <button id="draw-btn" onclick="drawCharacter()">¡SACAR PERSONAJE!</button>
            <button id="reset-btn" class="btn-reset" onclick="resetGame()">REINICIAR PARTIDA</button>
        </div>
        
        <p id="counter">Quedan: 19 / 19</p>
    </div>

    <div class="history-container">
        <div class="history-title">YA HAN SALIDO:</div>
        <div id="history-list"></div>
    </div>

    <script>
        const characters = [
            { file: 'PIKACHU.jpg', name: 'Pikachu' },
            { file: 'RAPUNZEL.jpg', name: 'Rapunzel' },
            { file: 'SHREK.jpg', name: 'Shrek' },
            { file: 'SPIDERMAN.jpg', name: 'Spider-Man' },
            { file: 'VAIANA.jpg', name: 'Vaiana' },
            { file: 'WALLE.jpg', name: 'Wall-E' },
            { file: 'YODA.jpg', name: 'Yoda' },
            { file: 'ASNO.jpg', name: 'Asno' },
            { file: 'ELSA.jpg', name: 'Elsa' },
            { file: 'HERMIONE.jpg', name: 'Hermione' },
            { file: 'ET.jpg', name: 'E.T.' },
            { file: 'HARRYPOTTER.jpg', name: 'Harry Potter' },
            { file: 'JACKSPARROW.jpeg', name: 'Jack Sparrow' },
            { file: 'MIERCOLES.jpg', name: 'Miércoles' },
            { file: 'OLAF.jpg', name: 'Olaf' },
            { file: 'SIMBA.jpg', name: 'Simba' },
            { file: 'BUDDY.jpeg', name: 'Buddy' },
            { file: 'SUPERMAN.jpg', name: 'Superman' },
            { file: 'DARTHVADER.jpg', name: 'Darth Vader' }
        ];

        let available = [...characters];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function drawCharacter() {
            if (available.length === 0) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            document.getElementById('draw-btn').disabled = true;
            let iterations = 0;
            const interval = setInterval(() => {
                const tempIndex = Math.floor(Math.random() * available.length);
                document.getElementById('character-name').innerText = available[tempIndex].name;
                playTickSound();
                iterations++;

                if (iterations > 12) {
                    clearInterval(interval);
                    finalizeSelection();
                }
            }, 80);
        }

        function finalizeSelection() {
            const randomIndex = Math.floor(Math.random() * available.length);
            const selected = available.splice(randomIndex, 1)[0];

            document.getElementById('display-image').src = selected.file;
            document.getElementById('character-name').innerText = selected.name;
            
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = selected.name;
            document.getElementById('history-list').prepend(item);

            document.getElementById('counter').innerText = `Quedan: ${available.length} / ${characters.length}`;
            
            if (available.length > 0) {
                document.getElementById('draw-btn').disabled = false;
            } else {
                document.getElementById('draw-btn').innerText = "¡FIN!";
            }
        }

        function resetGame() {
            if (confirm("¿Seguro que quieres reiniciar la partida?")) {
                available = [...characters];
                document.getElementById('history-list').innerHTML = '';
                document.getElementById('display-image').src = "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
                document.getElementById('character-name').innerText = "¿LISTOS?";
                document.getElementById('draw-btn').disabled = false;
                document.getElementById('draw-btn').innerText = "¡SACAR PERSONAJE!";
                document.getElementById('counter').innerText = `Quedan: ${characters.length} / ${characters.length}`;
            }
        }
    </script>
</body>
</html>
